<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Tech Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background glow elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Hero Section -->
        <header class="hero glass">
            <div class="hero-image-container">
                <img src="profile_pic.jpeg" alt="Profile Picture" class="profile-pic">
            </div>
            <div class="hero-text">
                <h1>Hello, I'm <span class="highlight">Festus Omuga Omerikit</span></h1>
                <h2>Passionate Tech Student,Developer,AI Enthusiast and innovator</h2>
                <p>I build dynamic, beautiful, and functional web applications. Check out my work below!</p>
            </div>
        </header>

        <!-- Projects Grid -->
        <section class="projects">
            <h3 class="section-title">My Projects</h3>
            <div class="projects-grid">
                <!-- Project 1 -->
                <button class="project-btn glass p-cyan" onclick="openProject('project1')">
                    <h4>editable to do list</h4>
                    <p>Python</p>
                </button>
                <!-- Project 2 -->
                <button class="project-btn glass p-purple" onclick="openProject('project2')">
                    <h4>Grocery management system</h4>
                    <p>html,css and javascript</p>
                </button>
                <!-- Project 3 -->
                <button class="project-btn glass p-pink" onclick="openProject('project3')">
                    <h4>Calculator</h4>
                    <p>Python</p>
                </button>
                <!-- Project 4 -->

            </div>
        </section>
    </div>

    <!-- Project Detail Modal/Overlay -->
    <div id="project-modal" class="modal">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeProject()">×</button>
            <div id="modal-body">
                <!-- Dynamic content loaded via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
